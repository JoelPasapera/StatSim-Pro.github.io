<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de ScientificCharts (graficas.js)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1100px;
            margin: 20px auto;
            padding: 20px;
            background: #f5f5f5;
        }

        h1 {
            color: #333;
        }

        .grid-graficos {
            display: grid;
            /* min(480px, 100%) evita que las columnas fuercen un ancho mínimo
               mayor que la pantalla en móviles. */
            grid-template-columns: repeat(auto-fit, minmax(min(480px, 100%), 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .grafico-card {
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 16px;
        }

        .grafico-card h2 {
            font-size: 16px;
            margin: 0 0 10px;
            color: #2E5BBA;
        }

        /* El SVG tiene tamaño fijo; se escala para no desbordar en pantallas estrechas. */
        .grafico-card svg {
            max-width: 100%;
            height: auto;
        }

        .error {
            color: #b00020;
            font-weight: bold;
        }
    </style>

    <!-- d3 vendorizado localmente (sin dependencia de CDN, coherente con el resto del proyecto) -->
    <script src="d3.v7.min.js"></script>
</head>

<body>

    <h1>📊 Prueba de la librería de gráficos (graficas.js)</h1>
    <p>Esta página ejercita la clase real <code>ScientificCharts</code> con datos de ejemplo.</p>

    <div class="grid-graficos">
        <div class="grafico-card">
            <h2>Distribución Gaussiana</h2>
            <div id="grafico-gaussiana"></div>
        </div>
        <div class="grafico-card">
            <h2>Matriz de Correlación</h2>
            <div id="grafico-correlacion"></div>
        </div>
        <div class="grafico-card">
            <h2>Diagrama de Caja y Bigotes</h2>
            <div id="grafico-caja"></div>
        </div>
        <div class="grafico-card">
            <h2>Diagrama de Violín</h2>
            <div id="grafico-violin"></div>
        </div>
    </div>

    <!-- Librería real de gráficos (la misma que usa la app) -->
    <script src="graficas.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Renderiza un gráfico de forma aislada: cualquier error se muestra
            // dentro de su propia tarjeta sin interrumpir a los demás.
            function renderizar(containerId, dibujar) {
                try {
                    const chart = new ScientificCharts(containerId, { width: 460, height: 340 });
                    dibujar(chart);
                } catch (error) {
                    console.error(`Error en ${containerId}:`, error);
                    const cont = document.getElementById(containerId);
                    if (cont) {
                        cont.innerHTML = `<p class="error">Error: ${error.message}</p>`;
                    }
                }
            }

            // Datos de ejemplo
            const grupoA = [10, 12, 15, 14, 18, 11, 13, 16, 25]; // 25 es un outlier
            const grupoB = [20, 22, 25, 24, 28, 21, 23, 26, 1];  // 1 es un outlier
            const grupoC = [30, 32, 35, 34, 38, 31, 33, 36];

            // Muestra aproximadamente normal para la distribución gaussiana
            const muestraGaussiana = [];
            for (let i = 0; i < 200; i++) {
                const u1 = Math.random() || 1e-9;
                const u2 = Math.random();
                const z = Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
                muestraGaussiana.push(100 + 15 * z);
            }

            // Matriz de correlación simétrica de ejemplo
            const matrizCorrelacion = [
                [1.00, 0.65, -0.20],
                [0.65, 1.00, 0.10],
                [-0.20, 0.10, 1.00]
            ];
            const etiquetas = ['Variable A', 'Variable B', 'Variable C'];

            renderizar('grafico-gaussiana', chart =>
                chart.createGaussianDistribution(muestraGaussiana, null, null, {
                    title: 'Distribución de Puntajes',
                    xLabel: 'Puntaje',
                    yLabel: 'Densidad'
                }));

            renderizar('grafico-correlacion', chart =>
                chart.createCorrelationMatrix(matrizCorrelacion, etiquetas, {
                    title: 'Matriz de Correlaciones'
                }));

            renderizar('grafico-caja', chart =>
                chart.createBoxPlot([grupoA, grupoB, grupoC], ['Control', 'Experimental', 'Grupo C'], {
                    title: 'Comparación entre Grupos',
                    xLabel: 'Grupo',
                    yLabel: 'Puntuación'
                }));

            renderizar('grafico-violin', chart =>
                chart.createViolinPlot([grupoA, grupoB], ['Control', 'Experimental'], {
                    title: 'Densidad por Grupo',
                    yLabel: 'Puntuación'
                }));
        });
    </script>

</body>

</html>
